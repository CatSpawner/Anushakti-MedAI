services:
  - type: web
    name: anushakti-medai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn hospital_ai_system.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "120"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "lax"
      - key: DATABASE_URL
        value: "sqlite:///./hospital_ai_system.db"
